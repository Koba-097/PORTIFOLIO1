</div>
        <h3>Ou Cadastrar:</h3>

<input type="password" id="registroSenha" placeholder="Senha">

stroke-width="2"
fill="none"
stroke-linecap="round"/>

<line x1="8" y1="16" x2="7" y2="19" stroke="magenta" stroke-width="2"/>

</g>

</svg>

</button>
